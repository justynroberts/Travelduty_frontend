apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: travelduty
spec:
  replicas: 3
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
      - name: backend
        image: travelduty/backend:3.6.6
        ports:
        - containerPort: 5044
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
