apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: travelduty
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
      - name: backend
        image: travelduty/backend:3.1.2
        ports:
        - containerPort: 5075
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
