apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: travelduty
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
      - name: backend
        image: travelduty/backend:5.9.7
        ports:
        - containerPort: 3728
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
