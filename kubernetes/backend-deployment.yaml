apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: travelduty
spec:
  replicas: 3
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
      - name: backend
        image: travelduty/backend:2.0.9
        ports:
        - containerPort: 7864
        resources:
          requests:
            memory: "64Mi"
            cpu: "250m"
