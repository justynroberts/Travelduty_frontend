apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: travelduty
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
      - name: backend
        image: travelduty/backend:3.7.2
        ports:
        - containerPort: 6071
        resources:
          requests:
            memory: "64Mi"
            cpu: "250m"
