apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: travelduty
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      containers:
      - name: api-gateway
        image: travelduty/api-gateway:4.1.0
        ports:
        - containerPort: 6299
        resources:
          requests:
            memory: "128Mi"
            cpu: "250m"
