apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  namespace: travelduty
spec:
  replicas: 3
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
      - name: postgres
        image: travelduty/postgres:3.3.2
        ports:
        - containerPort: 4052
        resources:
          requests:
            memory: "64Mi"
            cpu: "500m"
