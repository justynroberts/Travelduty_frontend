apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  namespace: travelduty
spec:
  replicas: 3
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
      - name: postgres
        image: travelduty/postgres:4.4.8
        ports:
        - containerPort: 4587
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
