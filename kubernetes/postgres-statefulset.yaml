apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  namespace: travelduty
spec:
  replicas: 3
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
      - name: postgres
        image: travelduty/postgres:1.2.1
        ports:
        - containerPort: 8195
        resources:
          requests:
            memory: "64Mi"
            cpu: "100m"
