apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: travelduty
spec:
  replicas: 2
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
      - name: redis
        image: travelduty/redis:4.0.8
        ports:
        - containerPort: 7005
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
