apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: travelduty
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
      - name: redis
        image: travelduty/redis:2.4.2
        ports:
        - containerPort: 4959
        resources:
          requests:
            memory: "128Mi"
            cpu: "500m"
