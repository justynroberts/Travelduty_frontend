apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: travelduty
spec:
  replicas: 5
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
      - name: redis
        image: travelduty/redis:2.7.2
        ports:
        - containerPort: 6962
        resources:
          requests:
            memory: "256Mi"
            cpu: "500m"
