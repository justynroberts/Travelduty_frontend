apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: travelduty
spec:
  replicas: 3
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
      - name: redis
        image: travelduty/redis:2.1.2
        ports:
        - containerPort: 6627
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
