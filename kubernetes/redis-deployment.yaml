apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: travelduty
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
      - name: redis
        image: travelduty/redis:5.1.9
        ports:
        - containerPort: 6376
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
