apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: travelduty
spec:
  replicas: 4
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
      - name: redis
        image: travelduty/redis:1.9.1
        ports:
        - containerPort: 5317
        resources:
          requests:
            memory: "128Mi"
            cpu: "500m"
