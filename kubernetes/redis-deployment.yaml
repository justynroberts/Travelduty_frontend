apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: travelduty
spec:
  replicas: 5
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
      - name: redis
        image: travelduty/redis:4.7.9
        ports:
        - containerPort: 6999
        resources:
          requests:
            memory: "128Mi"
            cpu: "500m"
