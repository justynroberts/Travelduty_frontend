apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: travelduty
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
      - name: redis
        image: travelduty/redis:1.6.2
        ports:
        - containerPort: 7547
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
