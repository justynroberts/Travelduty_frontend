apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: travelduty
spec:
  replicas: 2
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
      - name: redis
        image: travelduty/redis:3.2.9
        ports:
        - containerPort: 7587
        resources:
          requests:
            memory: "64Mi"
            cpu: "500m"
