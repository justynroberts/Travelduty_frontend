apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: travelduty
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
      - name: frontend
        image: travelduty/frontend:2.9.0
        ports:
        - containerPort: 8987
        resources:
          requests:
            memory: "256Mi"
            cpu: "500m"
