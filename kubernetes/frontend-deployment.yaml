apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: travelduty
spec:
  replicas: 3
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
      - name: frontend
        image: travelduty/frontend:1.8.3
        ports:
        - containerPort: 7943
        resources:
          requests:
            memory: "256Mi"
            cpu: "500m"
