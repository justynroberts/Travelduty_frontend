apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: travelduty
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
      - name: frontend
        image: travelduty/frontend:4.6.3
        ports:
        - containerPort: 3806
        resources:
          requests:
            memory: "64Mi"
            cpu: "250m"
