apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx
  namespace: travelduty
spec:
  replicas: 2
  selector:
    matchLabels:
      app: nginx
  template:
    metadata:
      labels:
        app: nginx
    spec:
      containers:
      - name: nginx
        image: travelduty/nginx:2.5.7
        ports:
        - containerPort: 6344
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
