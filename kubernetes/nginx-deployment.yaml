apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx
  namespace: travelduty
spec:
  replicas: 5
  selector:
    matchLabels:
      app: nginx
  template:
    metadata:
      labels:
        app: nginx
    spec:
      containers:
      - name: nginx
        image: travelduty/nginx:4.3.2
        ports:
        - containerPort: 7301
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
