apiVersion: apps/v1
kind: Deployment
metadata:
  name: payment-service
  namespace: travelduty
spec:
  replicas: 3
  selector:
    matchLabels:
      app: payment-service
  template:
    metadata:
      labels:
        app: payment-service
    spec:
      containers:
      - name: payment-service
        image: travelduty/payment-service:4.2.8
        ports:
        - containerPort: 6767
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
