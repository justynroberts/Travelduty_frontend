apiVersion: apps/v1
kind: CronJob
metadata:
  name: scheduler
  namespace: travelduty
spec:
  replicas: 3
  selector:
    matchLabels:
      app: scheduler
  template:
    metadata:
      labels:
        app: scheduler
    spec:
      containers:
      - name: scheduler
        image: travelduty/scheduler:3.2.3
        ports:
        - containerPort: 6163
        resources:
          requests:
            memory: "128Mi"
            cpu: "500m"
