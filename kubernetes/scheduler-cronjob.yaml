apiVersion: apps/v1
kind: CronJob
metadata:
  name: scheduler
  namespace: travelduty
spec:
  replicas: 3
  selector:
    matchLabels:
      app: scheduler
  template:
    metadata:
      labels:
        app: scheduler
    spec:
      containers:
      - name: scheduler
        image: travelduty/scheduler:1.1.1
        ports:
        - containerPort: 8978
        resources:
          requests:
            memory: "64Mi"
            cpu: "100m"
