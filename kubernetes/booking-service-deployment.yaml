apiVersion: apps/v1
kind: Deployment
metadata:
  name: booking-service
  namespace: travelduty
spec:
  replicas: 4
  selector:
    matchLabels:
      app: booking-service
  template:
    metadata:
      labels:
        app: booking-service
    spec:
      containers:
      - name: booking-service
        image: travelduty/booking-service:1.0.3
        ports:
        - containerPort: 7248
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
