apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker
  namespace: travelduty
spec:
  replicas: 5
  selector:
    matchLabels:
      app: worker
  template:
    metadata:
      labels:
        app: worker
    spec:
      containers:
      - name: worker
        image: travelduty/worker:3.6.9
        ports:
        - containerPort: 7808
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
