apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker
  namespace: travelduty
spec:
  replicas: 3
  selector:
    matchLabels:
      app: worker
  template:
    metadata:
      labels:
        app: worker
    spec:
      containers:
      - name: worker
        image: travelduty/worker:5.3.2
        ports:
        - containerPort: 6347
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
