apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker
  namespace: travelduty
spec:
  replicas: 3
  selector:
    matchLabels:
      app: worker
  template:
    metadata:
      labels:
        app: worker
    spec:
      containers:
      - name: worker
        image: travelduty/worker:5.8.9
        ports:
        - containerPort: 6741
        resources:
          requests:
            memory: "128Mi"
            cpu: "250m"
