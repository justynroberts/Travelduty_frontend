apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker
  namespace: travelduty
spec:
  replicas: 5
  selector:
    matchLabels:
      app: worker
  template:
    metadata:
      labels:
        app: worker
    spec:
      containers:
      - name: worker
        image: travelduty/worker:1.7.3
        ports:
        - containerPort: 7963
        resources:
          requests:
            memory: "128Mi"
            cpu: "500m"
