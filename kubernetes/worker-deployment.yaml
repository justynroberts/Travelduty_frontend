apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker
  namespace: travelduty
spec:
  replicas: 2
  selector:
    matchLabels:
      app: worker
  template:
    metadata:
      labels:
        app: worker
    spec:
      containers:
      - name: worker
        image: travelduty/worker:3.8.4
        ports:
        - containerPort: 8359
        resources:
          requests:
            memory: "128Mi"
            cpu: "250m"
