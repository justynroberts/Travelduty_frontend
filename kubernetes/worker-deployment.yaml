apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker
  namespace: travelduty
spec:
  replicas: 2
  selector:
    matchLabels:
      app: worker
  template:
    metadata:
      labels:
        app: worker
    spec:
      containers:
      - name: worker
        image: travelduty/worker:3.5.1
        ports:
        - containerPort: 4461
        resources:
          requests:
            memory: "64Mi"
            cpu: "500m"
